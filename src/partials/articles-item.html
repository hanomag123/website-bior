<div class="swiper-slide articles-item @class">
  <a href="article.html" class="main-hiddenlink">@title</a>
  <div class="articles-img img-cover">
    <img src="./assets/images/articles/@img" alt="articles">
  </div>

  <h3 class="articles-subtitle h6">@title</h3>

  <div class="main-link">
    <svg>
      <use xlink:href='./assets/images/sprite.svg#link'></use>
    </svg>
  </div>
</div>
