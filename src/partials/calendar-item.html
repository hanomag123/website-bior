<div class="calendar-row">
  <div class="calendar-td date body-1 font-regular xl-body-3" data-label="ДАТА">@date</div>
  <h3 class="calendar-td title body-1 xl-body-2" data-label="ТЕМА">@title</h3>
  <div class="calendar-td format body-1 font-regular xl-body-3" data-label="ФОРМАТ">@format</div>

  <button class="calendar-button btn btn-white body-3 xl-small">Зарегистрироваться</button>
</div>
